name: Build DKernel Module

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出驱动源码
        uses: actions/checkout@v4

      - name: 安装编译工具链
        run: |
          sudo apt-get update
          sudo apt-get install -y git flex bison bc build-essential zip curl \
            libssl-dev libncurses-dev gcc-aarch64-linux-gnu

      - name: 克隆 OPPO SM7325 内核源码
        run: |
          git clone --depth=1 https://github.com/oppo-source/android_kernel_oppo_sm7325.git \
            ${{ github.workspace }}/kernel_src

      - name: 配置内核（自动选择 defconfig）
        run: |
          cd ${{ github.workspace }}/kernel_src
          # 查找第一个可用的 defconfig 文件
          DEFCONFIG=$(ls arch/arm64/configs/*_defconfig 2>/dev/null | head -1 | xargs basename | sed 's/_defconfig//')
          if [ -z "$DEFCONFIG" ]; then
            # 如果没有 *_defconfig，检查是否有 defconfig 文件
            if [ -f arch/arm64/configs/defconfig ]; then
              cp arch/arm64/configs/defconfig .config
              make ARCH=arm64 olddefconfig
            else
              echo "错误：未找到任何 defconfig 文件！"
              ls arch/arm64/configs/
              exit 1
            fi
          else
            make ARCH=arm64 ${DEFCONFIG}_defconfig
          fi

      - name: 准备内核模块编译环境
        env:
          ARCH: arm64
          CROSS_COMPILE: aarch64-linux-gnu-
        run: |
          cd ${{ github.workspace }}/kernel_src
          make ARCH=arm64 modules_prepare

      - name: 编译驱动模块（DKernel）
        env:
          ARCH: arm64
          CROSS_COMPILE: aarch64-linux-gnu-
          KERNEL_SRC: ${{ github.workspace }}/kernel_src
        run: |
          cd ${{ github.workspace }}
          make

      - name: 打包产物
        run: |
          mkdir -p artifacts
          cp *.ko artifacts/ 2>/dev/null || true
          cp ${{ github.workspace }}/kernel_src/include/config/kernel.release artifacts/kernel_version.txt 2>/dev/null || true
          cd artifacts
          zip ../DKernel-$(date +%Y%m%d-%H%M%S).zip *

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: DKernel-module
          path: DKernel-*.zip
