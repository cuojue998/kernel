name: Build Kernel Modules (SM7325)
on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        fetch-depth: 0

      - name: 安装编译依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git flex bison gperf build-essential zip curl \
          zlib1g-dev libncurses5-dev libssl-dev bc libelf-dev lz4 cpio

      - name: 缓存 AOSP Clang
        id: cache-clang
        uses: actions/cache@v3
        with:
          path: clang
          key: clang-r416183b1-sm7325

      - name: 下载 Android12 Clang r416183b1
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p clang
          cd clang
          # 正确完整预编译包地址
          wget -q https://storage.googleapis.com/chromium-browser-clang/Linux_x64/clang-r416183b1.tar.xz
          tar -xf clang-r416183b1.tar.xz
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: 内核模块编译环境
        env:
          ARCH: arm64
          CC: clang
          CLANG_TRIPLE: aarch64-linux-gnu-
          CROSS_COMPILE: aarch64-linux-gnu-
        run: |
          # 清理旧编译产物
          rm -rf out
          # 改用SM7325对应defconfig，自行替换成你设备的defconfig名
          make O=out ARCH=arm64 vendor/holi_QGKI.config
          # 开启兼容第三方模块、关闭严格vermagic
          echo "CONFIG_MODULES=y" >> out/.config
          echo "CONFIG_MODULE_UNLOAD=y" >> out/.config
          echo "CONFIG_ALLOW_UNSUPPORTED_MODULES=y" >> out/.config
          echo "CONFIG_MODVERSIONS=n" >> out/.config
          # 准备编译环境
          make O=out ARCH=arm64 modules_prepare
          # 编译当前仓库外部驱动模块
          make O=out ARCH=arm64 M=$(pwd) modules -j$(nproc)

      - name: 打包 ko 产物
        run: |
          mkdir -p artifacts
          find . -maxdepth 3 -name "*.ko" -exec cp {} artifacts/ \;
          zip -r kernel-modules-$(date +%Y%m%d%H%M%S).zip artifacts/

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: SM7325-KO-Modules
          path: kernel-modules-*.zip
